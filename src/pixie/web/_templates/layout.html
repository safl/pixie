<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}pixie{% endblock %}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
            margin: 0;
            padding: 0;
            background: #0f172a;
            color: #e2e8f0;
        }
        .container {
            max-width: 960px;
            margin: 2rem auto;
            padding: 2rem;
        }
        .nav {
            background: #1e293b;
            padding: 1rem 2rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }
        .nav a {
            color: #e2e8f0;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .nav a.active {
            color: #60a5fa;
            font-weight: 600;
        }
        .nav a:hover {
            color: #93c5fd;
        }
        .nav .brand {
            font-weight: 600;
            color: #cbd5e1;
            margin-right: 0.5rem;
        }
        .nav .logout {
            margin-left: auto;
        }
        .nav .logout button {
            background: transparent;
            padding: 0.25rem 0.75rem;
            border: 1px solid #334155;
            font-size: 0.85rem;
        }
        .nav .logout button:hover {
            background: #334155;
        }
        .card {
            background: #1e293b;
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        h1 {
            margin-top: 0;
            font-size: 1.75rem;
        }
        input[type="password"] {
            padding: 0.5rem;
            border: 1px solid #334155;
            border-radius: 4px;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 4px;
            background: #3b82f6;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }
        button:hover {
            background: #2563eb;
        }
        .error {
            color: #f87171;
            margin: 1rem 0;
        }
        .muted {
            color: #94a3b8;
            font-size: 0.875rem;
        }
        .version {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            color: #475569;
            font-size: 0.75rem;
        }
        code {
            background: #0f172a;
            padding: 0.125rem 0.375rem;
            border-radius: 3px;
            font-family: "SF Mono", Monaco, Consolas, monospace;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="container">
        {% if authed %}
        <nav class="nav">
            <span class="brand">pixie</span>
            <a href="/ui/" class="{{ 'active' if page == 'dashboard' else '' }}">Catalog</a>
            <a href="/ui/exports" class="{{ 'active' if page == 'exports' else '' }}">Exports</a>
            <a href="/ui/machines" class="{{ 'active' if page == 'machines' else '' }}">Machines</a>
            <form method="post" action="/ui/logout" class="logout">
                <button type="submit">Sign out</button>
            </form>
        </nav>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
    <div class="version">pixie v{{ version }}</div>
</body>
</html>
