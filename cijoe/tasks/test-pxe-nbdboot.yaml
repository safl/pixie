doc: |
  pixie PXE nbdboot chain test
  =============================

  End-to-end proof that a real nosi nbdboot works on a QEMU client
  through pixie:

  1. ``pxe_prepare``: build the ``pixie:pxetest`` container image
     from this checkout.
  2. ``pxe_run_chain_test`` with ``mode = "nbdboot"``: brings up
     pixie, POSTs ``/ui/catalog/import`` with the pinned nosi
     catalog URL, triggers fetch on the paired
     ``debian-13-headless-netboot`` bundle + ``debian-13-headless``
     disk image, waits for both content_sha256 values (~15 min
     budget for the disk-image oras pull + img.gz decompress),
     PUTs the client MAC to ``boot_mode=nbdboot`` bound to the
     disk sha, then PXE-boots the QEMU client and asserts every
     marker in ``[test.pxe.chain_markers]`` shows up on the client
     serial log -- iPXE loaded, artifacts fetched, kernel booted,
     Debian userspace up.

  What's covered here: real catalog retrieval + real oras pulls +
  real img.gz decompression to pixie's blob store + pixie's NBD
  export spawn + iPXE nbdboot chain + real Debian pivot into
  userspace served over NBD. No test-side HTTP shim, no
  locally-assembled bundle, no synthetic ext4 disk.

  What's NOT covered: an OS-level post-boot task (cloud-init
  runthrough, sshd bring-up, etc.) -- the nbdboot pipeline is
  proved once systemd + Debian userspace come up; further
  assertions would need a scripted terminal driver.

  Requires: podman, qemu-system-x86, dnsmasq, ipxe,
  bridge-utils / iproute2, KVM, passwordless sudo, and internet
  access to ghcr.io + github.com/safl/nosi.

steps:
- name: pxe_prepare
  uses: pxe_prepare

- name: pxe_run_chain_test
  uses: pxe_run_chain_test
