# pixie PXE inventory chain test: containerized pixie + a bridged QEMU
# client booting into pixie's own live env (netboot-pc bake) via a
# boot_mode=pixie-inventory bind.
#
# Usage:
#   cijoe tasks/test-pxe-inventory.yaml --monitor -c configs/test-pxe-inventory.toml
#
# Pre-conditions:
# - podman, qemu-system-x86_64, dnsmasq, ipxe (NBPs under /usr/lib/ipxe),
#   iproute2 on PATH.
# - passwordless sudo (bridge/tap/dnsmasq).
# - KVM accessible.
# - ``pixie-netboot-pc-x86_64`` bake artifacts staged under
#   ``~/system_imaging/disk/`` (or override
#   ``PIXIE_NETBOOT_ARTIFACT_DIR``).

[pixie]
variant = "test-pxe-inventory"

[cijoe.workflow]
fail_fast = true

[test.pxe]
mode = "inventory"

# pixie container image tag (built by pxe_prepare from this checkout).
pixie_image = "pixie:pxetest"

# Admin password set on the container; the test uses it to PUT the
# machine binding.
admin_password = "test-admin-pw"

# Client VM firmware: "bios" (SeaBIOS + NIC option ROM) or "uefi" (OVMF).
client_firmware = "bios"
client_mac = "52:54:00:11:22:55"

# Host bridge for the synthetic PXE segment. server_pxe_ip is where
# pixie is reachable and where the client's HTTP fetch for
# vmlinuz + initrd + squashfs lands.
bridge = "br-ipxe"
tap_iface = "tap-ipxe"
server_pxe_ip = "192.168.99.1"
pxe_netmask = "255.255.255.0"
dhcp_range_lo = "192.168.99.50"
dhcp_range_hi = "192.168.99.150"

# Chain markers. iPXE-side markers cover the bootstrap chain; new
# ones assert the pixie-live-env plan actually served + the live-env
# artifacts fetched over HTTP + Debian live-boot pivoted into the
# real pixie live env.
[[test.pxe.chain_markers]]
key = "ipxe-loaded"
needle = "iPXE"

[[test.pxe.chain_markers]]
key = "ipxe-fetch-bootstrap"
needle = "pxe-bootstrap.ipxe"

# The pixie-live-env.j2 template emits ``boot=live components ip=dhcp
# fetch=...`` in the kernel line; the marker below fires when iPXE
# echoes the kernel URL fetch back to console.
[[test.pxe.chain_markers]]
key = "live-env-vmlinuz"
needle = "/boot/pixie-live-env/vmlinuz"

[[test.pxe.chain_markers]]
key = "live-env-initrd"
needle = "/boot/pixie-live-env/initrd"

# Debian live-boot mounts the squashfs fetched from
# /boot/pixie-live-env/squashfs and pivots.
[[test.pxe.chain_markers]]
key = "live-env-squashfs"
needle = "/boot/pixie-live-env/live.squashfs"

# Kernel boots. Linux prints ``Linux version`` from the kernel
# decompressor.
[[test.pxe.chain_markers]]
key = "kernel-boot"
needle = "Linux version"

# Debian live-boot's own console banner + pivot. The exact string
# has stayed stable across live-boot 20220727 -> 20250725; if it
# ever drifts, the pixie-on-tty1 marker below still nails it.
[[test.pxe.chain_markers]]
key = "systemd-started"
needle = "systemd["

# pixie-on-tty1.service ran the ported pixie CLI. The CLI's
# ``_auto_post_inventory`` background thread POSTs an inventory
# blob to /pxe/<mac>/inventory; the downstream
# _verify_server_inventory GET asserts the POST landed.
[[test.pxe.chain_markers]]
key = "pixie-on-tty1"
needle = "pixie:"
