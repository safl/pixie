# pixie PXE nbdboot chain test: containerized pixie + a bridged QEMU
# client that pulls the real nosi netboot bundle + disk image, then
# does nbdboot via pixie's NBD export.
#
# Usage:
#   cijoe tasks/test-pxe-nbdboot.yaml --monitor -c configs/test-pxe-nbdboot.toml
#
# Pre-conditions:
# - podman, qemu-system-x86_64, dnsmasq, ipxe (NBPs under /usr/lib/ipxe),
#   iproute2 on PATH.
# - passwordless sudo (bridge/tap/dnsmasq).
# - KVM accessible.
# - Internet access from the runner to ghcr.io (real nosi oras pulls)
#   and to github.com (real nosi catalog.toml download).

[pixie]
variant = "test-pxe-nbdboot"

[cijoe.workflow]
fail_fast = true

[test.pxe]
mode = "nbdboot"

# pixie container image tag (built by pxe_prepare from this checkout).
pixie_image = "pixie:pxetest"

# Admin password set on the container; the test uses it to
# POST /ui/catalog/import + trigger the fetch on the disk + bundle
# entries + PUT the machine binding.
admin_password = "test-admin-pw"

# Client VM firmware: "bios" (SeaBIOS + NIC option ROM) or "uefi" (OVMF).
client_firmware = "bios"
client_mac = "52:54:00:11:22:44"

# Host bridge for the synthetic PXE segment. server_pxe_ip is where
# pixie is reachable AND where pixie's per-machine NBD export binds
# for the guest to connect to. No test-side HTTP shim in this mode --
# both the netboot bundle and the disk image come from ghcr.io via
# pixie's own oras client.
bridge = "br-rpxe"
tap_iface = "tap-rpxe"
server_pxe_ip = "192.168.99.1"
pxe_netmask = "255.255.255.0"
dhcp_range_lo = "192.168.99.50"
dhcp_range_hi = "192.168.99.150"

# Ramboot markers. Chain: iPXE loaded, HTTP re-DHCP, chain to
# bootstrap, per-MAC nbdboot plan fetch, iPXE fetches vmlinuz +
# initrd out of pixie's ``/artifacts/`` (unpacked from the fetched
# netboot bundle), kernel boots, initramfs mounts the disk image over
# NBD, Debian pivots to userspace, systemd starts, getty prints login
# banner on the serial console.
[[test.pxe.chain_markers]]
key = "ipxe-loaded"
needle = "iPXE"

[[test.pxe.chain_markers]]
key = "ipxe-fetch-bootstrap"
needle = "pxe-bootstrap.ipxe"

# Netboot bundle's vmlinuz + initrd fetched from pixie's
# content-addressed /artifacts/ path (fires on both iPXE-side + the
# server-side uvicorn access log).
[[test.pxe.chain_markers]]
key = "artifacts-fetch"
needle = "/artifacts/"

# Kernel boot. Linux prints "Linux version <ver>" from the
# decompressor.
[[test.pxe.chain_markers]]
key = "kernel-boot"
needle = "Linux version"

# systemd started in the pivoted userspace (nosi disk image is
# Debian 13; its systemd version banner reads "systemd 25X.Y" on
# every distro-headless boot).
[[test.pxe.chain_markers]]
key = "systemd-started"
needle = "systemd["

# Debian userspace-specific marker: the systemd generator emits the
# distro name on the console via the /etc/os-release ID during
# NAME-branded target banners. Present on every Debian boot -- if
# it doesn't appear here, nbdboot got as far as systemd starting
# but Debian userspace itself did not come up.
[[test.pxe.chain_markers]]
key = "debian-userspace"
needle = "Debian"

# ---- Positive userland proof ---------------------------------------
#
# Getty printed the login prompt on the serial console: this is what
# "operator-usable userland" actually looks like from outside the VM.
# Getty runs as part of getty.target, which is pulled in by
# multi-user.target, so a login prompt on serial is unambiguous
# proof that multi-user.target was reached. Chosen over the
# "Reached target multi-user.target" systemd banner because Debian
# 13 boots in ``quiet`` mode by default and does not print that
# banner on the console -- getty's login prompt is always printed.
# Catches the "boots to systemd but a hanging unit blocks userspace"
# shape where the earlier markers (systemd-started, debian-userspace)
# fire but the target never reaches operator-usable userland.
[[test.pxe.chain_markers]]
key = "login-prompt"
needle = "login:"

# ---- Forbidden markers ---------------------------------------------
#
# Anything below here MUST NOT appear on the client serial log or
# in pixie's container logs. The check runs alongside the positive-
# marker poll and fails the whole test the moment any needle hits.
# Kept scoped to failure signals that would leave a booted-looking
# target with a broken userland (booted markers OK, but the console
# spells out the bad news).

# systemd-resolved / networkd starvation with no fallback resolv.conf.
# The mount hook's mask of systemd-networkd + NetworkManager killed
# both DHCP daemons on the pivoted rootfs; if the initrd's
# /etc/resolv.conf write did not stick, apt / curl on the target log
# this literal string on serial. Nosi 2026.W30's mount hook unlinks
# the /etc/resolv.conf symlink before writing so glibc's resolver
# reads the file directly -- if a regression puts the symlink back,
# this marker fires.
[[test.pxe.forbidden_markers]]
key = "dns-broken"
needle = "Temporary failure resolving"

# sshd itself failed to start (its unit went into failed state during
# multi-user.target activation). Distinct from "sshd-started not
# seen" so the operator gets a clear "start failure" vs "start never
# attempted" diagnosis in the CI log.
[[test.pxe.forbidden_markers]]
key = "sshd-failed"
needle = "Failed to start ssh.service"

# Dracut emergency shell: the mount hook died with _pixie_die and
# systemd-emergency published the emergency-shell prompt. Every
# persist-branch regression this session ended here.
[[test.pxe.forbidden_markers]]
key = "dracut-emergency"
needle = "dracut-emergency"

# Post-pivot emergency mode (something failed in userspace's own
# init and systemd fell back to emergency.target).
[[test.pxe.forbidden_markers]]
key = "emergency-mode"
needle = "Emergency mode"
