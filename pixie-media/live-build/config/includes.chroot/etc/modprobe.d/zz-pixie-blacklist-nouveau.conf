# pixie: prevent the in-tree nouveau driver from binding any Nvidia GPU.
#
# Why: nouveau is the reverse-engineered open-source Nvidia driver. On
# Maxwell, Pascal, and Turing-era cards it stalls early boot 10-60s
# probing for vendor firmware blobs that aren't shipped with the
# kernel ("nouveau 0000:01:00.0: gsp: firmware unavailable" -style
# loops), and its DRM/KMS path can wedge the framebuffer init that
# agetty + ``pixie`` (the wizard) sit on top of. Symptom from the
# operator's perspective: 30+ second pauses at boot with no
# visible log line explaining what's happening, sometimes
# followed by a corrupt console.
#
# pixie does not need a GPU driver. The kernel falls back to
# ``efifb`` (UEFI boot) or ``simplefb`` (built-in framebuffer) for
# the text console, which is everything ``pixie`` / agetty require. Discrete Nvidia hardware on a flash target is
# common in lab inventory; blacklisting nouveau in the live env
# means PXE-booting an Nvidia-equipped box doesn't stall.
#
# Two layers of defence:
#
#   1. ``blacklist nouveau`` -- modprobe refuses to auto-load.
#      Honoured by udev's coldplug + by the initramfs-tools hooks
#      that read /etc/modprobe.d/ before triggering modules.
#   2. ``install nouveau /bin/true`` -- if anything forces a
#      ``modprobe nouveau`` (a desktop env, a debug script, a
#      forgotten initrd path), the install command runs /bin/true
#      instead of the real load. Belt-and-braces against the rare
#      case where ``blacklist`` is bypassed.
#
# Kernel cmdline ``modprobe.blacklist=nouveau nouveau.modeset=0``
# is added by the iPXE templates and (for the server appliance) by
# the cloud-init runcmd that touches GRUB_CMDLINE_LINUX_DEFAULT --
# that catches the initrd window before /etc/modprobe.d is mounted.
blacklist nouveau
install nouveau /bin/true
